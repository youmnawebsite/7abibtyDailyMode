<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مزاج حبيبتي</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/wavesurfer.js"></script>
</head>
<body>
  <div id="app">
    <h1 id="question">حبيبتي</h1>
    <div id="choices"></div>
    <input type="text" id="extraInput" placeholder="اكتبي اللي هتقوليه او مضايقك هنا يفراشتي" style="display: none;">
    <button id="submitBtn" style="display: none;">إرسال</button>
    <button id="recordButton" style="display: none;">🎤 تسجيل</button>
    <button id="stopButton" style="display: none;">⏹️ إيقاف</button>
    <audio id="audioPreview" controls style="display: none;"></audio>
    <button id="retryButton" style="display: none;">🔄 إعادة التسجيل</button>
    <p id="recordingTimer" style="display: none; font-size: 18px; font-weight: bold; text-align: center; color: #ff4757;"></p>
      </div>

  <script defer src="script.js"></script>
</body>
</html>
