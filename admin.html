<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f4f4f4;
    }
    .button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    .button.delete {
      background-color: #f44336;
    }
    .button.edit {
      background-color: #008CBA;
    }
  </style>
</head>
<body>
  <h1>Admin Panel</h1>
  <table id="responsesTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Question</th>
        <th>Answer</th>
        <th>Timestamp</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be populated here -->
    </tbody>
  </table>

  <script>
    // Fetch data and populate the table
    async function fetchResponses() {
      try {
        const res = await fetch('/responses');
        const data = await res.json();

        const tableBody = document.getElementById('responsesTable').querySelector('tbody');
        tableBody.innerHTML = '';

        data.forEach(response => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${response.id}</td>
            <td>${response.question}</td>
            <td>${response.answer}</td>
            <td>${new Date(response.timestamp).toLocaleString()}</td>
            <td>
              <button class="button edit" onclick="editResponse(${response.id})">Edit</button>
              <button class="button delete" onclick="deleteResponse(${response.id})">Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      } catch (err) {
        console.error('Error fetching responses:', err);
        alert('Failed to fetch responses.');
      }
    }

    // Delete a response
    async function deleteResponse(id) {
      if (confirm('Are you sure you want to delete this response?')) {
        try {
          const res = await fetch(`/responses/${id}`, { method: 'DELETE' });
          if (res.ok) {
            alert('Response deleted successfully.');
            fetchResponses();
          } else {
            throw new Error('Failed to delete response.');
          }
        } catch (err) {
          console.error('Error deleting response:', err);
          alert('Failed to delete response.');
        }
      }
    }

    // Edit a response
    function editResponse(id) {
      const newAnswer = prompt('Enter the new answer:');
      if (newAnswer) {
        updateResponse(id, newAnswer);
      }
    }

    // Update a response
    async function updateResponse(id, newAnswer) {
      try {
        const res = await fetch(`/responses/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ answer: newAnswer }),
        });
        if (res.ok) {
          alert('Response updated successfully.');
          fetchResponses();
        } else {
          throw new Error('Failed to update response.');
        }
      } catch (err) {
        console.error('Error updating response:', err);
        alert('Failed to update response.');
      }
    }

    // Load responses when the page loads
    fetchResponses();
  </script>
</body>
</html>
